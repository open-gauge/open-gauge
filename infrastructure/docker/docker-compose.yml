version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mar_user
      POSTGRES_PASSWORD: mar_password
      POSTGRES_DB: mar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mar_user -d mar_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mar_user:mar_password@db:5432/mar_db
      SECRET_KEY: change-this-secret-key-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: mar_admin
      MINIO_SECRET_KEY: mar_password_secret
      MINIO_BUCKET: mar-files
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      # Repo-root context (not apps/web) so the build can also reach
      # apps/docs/content/docs/guide — the Knowledge Center is rendered inline at
      # /documentation using the same content apps/docs serves standalone. See
      # apps/web/source.config.ts and apps/web/Dockerfile.
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_DOCS_URL: http://localhost:3002
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  docs:
    build:
      context: ../../apps/docs
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mar_admin
      MINIO_ROOT_PASSWORD: mar_password_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
