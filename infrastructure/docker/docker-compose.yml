# Pins the Compose project name regardless of the working directory or how
# `docker compose` is invoked from (Compose otherwise derives it from the
# current directory name, e.g. "docker" if you `cd` into this folder first vs.
# something else if you run it from the repo root or a script) — without this,
# switching how you invoke Compose creates a *second*, differently-named stack
# with its own fresh `postgres_data`/`minio_data` volumes, making uploaded
# files (profile pictures, signatures, PDFs, certificate templates) and
# database rows appear to "disappear" after a rebuild when they're actually
# just sitting in the old stack's volumes.
name: opengauge

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}

      # Public URL of the frontend — used to build links inside the app,
      # including the asset URL encoded into generated QR codes.
      FRONTEND_URL: ${FRONTEND_URL}

      # Allow both localhost and remote clients
      CORS_ORIGINS: ${CORS_ORIGINS}

      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s

    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL}

    ports:
      - "3000:3000"

    environment:
      API_INTERNAL_URL: http://api:8000

    depends_on:
      api:
        condition: service_healthy

    restart: unless-stopped

  docs:
    build:
      context: ../../apps/docs
      dockerfile: Dockerfile

    ports:
      - "3002:3000"

    environment:
      API_INTERNAL_URL: http://api:8000

    depends_on:
      api:
        condition: service_healthy

    restart: unless-stopped

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"

    depends_on:
      - db

    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: