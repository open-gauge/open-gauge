name: docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "apps/api/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "apps/api/**"
      - ".github/workflows/docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start database and API
        run: docker compose -f infrastructure/docker/docker-compose.yml up -d --build db api

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time" >&2
          docker compose -f infrastructure/docker/docker-compose.yml logs api
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json

      - name: Install dependencies
        working-directory: apps/docs
        run: npm ci

      - name: Build docs
        working-directory: apps/docs
        env:
          API_INTERNAL_URL: http://localhost:8000
        run: npm run build

      - name: Tear down
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.yml down -v
